name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@10.15.0
      - run: pnpm install --no-frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm run desktop:build
      - uses: actions/upload-artifact@v4
        with:
          name: OpenHarness-Windows
          path: |
            target/release/openharness-desktop.exe
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi

  macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: x86_64
          - runner: macos-14
            target: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@10.15.0
      - run: pnpm install --no-frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
      - run: pnpm run desktop:build:${{ matrix.target }}
      - name: Find DMG
        run: find target -name '*.dmg' -print
      - uses: actions/upload-artifact@v4
        with:
          name: OpenHarness-macOS-${{ matrix.target }}
          path: target/**/bundle/dmg/*.dmg
